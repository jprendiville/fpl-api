<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        fpl {% block title %}  {% endblock %}
    </title>
    <meta charset="UTF-8">

    {% load static %}

    <link type="text/css" href="{% static 'css/custom.css' %}" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>


    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.ico' %}"/>

</head>

<body>
    {% include 'includes/navigation.html' %}
    {% include '-modal.html' %}

    <div id="loading-overlay" class="overlay">
        <div class="spinner"></div>
    </div>

    <div class="pcoded-main-container">
        <div class="pcoded-wrapper">
            <div id="content">
                {% block content %}{% endblock content %}
            </div>
        </div>
    </div>

    {% load static %}

    <script type="text/javascript" src="{% static 'js/main.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/spinner.js' %}"></script>
    <script type="text/javascript" src="{% static 'js/jquery.bootstrap.modal.forms.js' %}"></script>

    <!-- Specific Page JS-->
    {% block javascripts %}
    {% endblock javascripts %}
    
</body>
{% include 'includes/footer.html' %}
</html>
